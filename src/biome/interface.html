<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>the biome — a shared frame</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { background:#0b0d12; color:#cdd3df; font:15px/1.6 Georgia,serif;
         max-width:760px; margin:0 auto; padding:20px 18px 90px; }
  h1 { font:600 16px/1.4 system-ui,sans-serif; color:#e8edf6; letter-spacing:.2px; margin:0 0 4px; }
  h1 b { color:#c7b3f0; }
  .sub { color:#7f8aa0; font:12px system-ui,sans-serif; margin:0 0 16px; }
  .sub input { background:#0e1117; color:#e8edf6; border:1px solid #2a3146; border-radius:6px;
               padding:3px 8px; font:12px system-ui,sans-serif; width:120px; }
  label { display:block; font:11px system-ui,sans-serif; color:#7f8aa0;
          text-transform:uppercase; letter-spacing:.1em; margin:20px 0 7px; }
  .frame { white-space:pre-wrap; background:#11141b; border:1px solid #232838; border-radius:8px;
           padding:14px; font:12.5px/1.55 ui-monospace,SFMono-Regular,monospace; color:#aeb6c6;
           max-height:300px; overflow:auto; }
  .frame .coord { color:#7fd6a6; } .frame .proj { color:#d99a6c; }
  /* the registers — vapour rises (live), liquid pools (the fan), solid settles (the public 1⁰), the fold derives */
  .zone { border-radius:8px; padding:11px 13px; margin-top:7px; min-height:30px; }
  .vapour { border:1px dashed #2c3550; background:#0d1018; }
  .liquid { border:1px solid #3a3320; background:#15120c; border-left:3px solid #d9a441; }
  .solid  { border:1px solid #22304a; background:#0c1320; border-left:3px solid #4ea8d9; }
  .fold   { border:1px solid #2a2440; background:#100c18; border-left:3px solid #c7b3f0; }
  .row { padding:4px 0; }
  .who { color:#c7b3f0; font:12px system-ui,sans-serif; }
  .sign { color:#727d93; font:10px system-ui,sans-serif; text-transform:uppercase; letter-spacing:.08em; }
  .mine { color:#e6c07a; }
  .vapour .row { color:#8893a6; font-style:italic; }
  .vapour .me { color:#cdd3df; font-style:normal; }
  .liquid .row b { color:#e6c07a; font-weight:600; }
  .solid .row { color:#bcd0e6; padding:8px 0; border-top:1px solid #16202e; }
  .solid .row:first-child { border-top:0; }
  .fold .row { color:#cabfe6; }
  .empty { color:#56607a; font-style:italic; font:13px system-ui,sans-serif; }
  textarea { width:100%; background:#0e1117; color:#e8edf6; border:1px solid #2a3146; border-radius:8px;
             padding:11px; font:15px/1.5 Georgia,serif; resize:vertical; }
  .acts { margin-top:9px; display:flex; gap:9px; align-items:center; }
  button { padding:8px 18px; border:0; border-radius:8px; font:600 13px system-ui,sans-serif; cursor:pointer; }
  .submit { background:#d9a441; color:#161208; }
  .commit { background:#2a3650; color:#cfe0f2; }
  button:disabled { background:#39414f; color:#8a93a6; cursor:default; }
  .hint { color:#56607a; font:11px system-ui,sans-serif; }
</style>
</head>
<body>
  <h1><b id="place">a shared frame</b></h1>
  <p class="sub">you are <input id="handle" placeholder="a name"> · at <input id="where" placeholder="a place">
     · <span id="present">alone here</span></p>

  <label>your bound moment — here · now · who <span class="hint" id="coordnote"></span></label>
  <div class="frame" id="frame">reading the world…</div>

  <label>vapour — thinking aloud <span class="hint">(live, shared, never saved)</span></label>
  <textarea id="draft" rows="2" placeholder="type your account of this place — others here see it as you think…"></textarea>
  <div class="zone vapour" id="vapour"><span class="empty">no one else is drafting</span></div>

  <label id="liquidlabel">liquid — the fan <span class="hint">(everyone's rendition of this place)</span></label>
  <div class="zone liquid" id="liquid"><span class="empty">nothing voiced yet</span></div>
  <div class="acts">
    <button class="submit" id="submit">voice it ↓</button>
    <button class="commit" id="commit" hidden>commit →</button>
    <span class="hint" id="status"></span>
  </div>

  <label>solid — the place itself <span class="hint">(the public 1⁰ — the shared spine's voicing)</span></label>
  <div class="zone solid" id="solid"><span class="empty">no public voicing yet</span></div>

  <label id="foldlabel">the social fold <span class="hint">(the collective sense — derived from the fan, 1⁹)</span></label>
  <div class="zone fold" id="fold"><span class="empty">nothing to fold yet</span></div>

<script type="module">
// the genome interface — a shared VLS frame over the biome's engagement layer.
// PRIMARY (when a place is chosen): the fan-and-fold over /frame + /social —
//   the public 1⁰ (solid), each inhabitant's rendition at the same address (the
//   fan = liquid, yours editable), the collective fold (derived, 1⁹), vapour live
//   on /relay. Your "voice it" is the I-axis write: a door point-write into your
//   own shell surface (surface-<handle>) at the place's address.
// FALLBACK (no place): the recipe view — read the `frame` recipe block and walk
//   S/T/I with spark.js. A new world is a new recipe block, not new page code.
import { descend, voice, spindle, ring } from "/spark.js";
const Q = new URLSearchParams(location.search);
const DOOR = "/.well-known/biome-beach", RELAY = "/relay";
const DIGITS = "123456789".split("");
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const slug = h => (h||"").replace(/[^a-z0-9-]/gi, "").toLowerCase();

let HANDLE = localStorage.getItem("biome-handle") || "";
let WHERE  = Q.get("where") || localStorage.getItem("biome-where") || "";
const WHEN = Q.get("when") || "now";
let MODE = "recipe";                 // "engagement" once a place resolves through /frame
let SCOPE = "", ADDRESS = "";        // relay scope + the resolved address (for the I-axis write)
let RECIPE = null, WALK = [];        // recipe fallback only
$("#handle").value = HANDLE; $("#where").value = WHERE;
$("#handle").addEventListener("change", e => {
  HANDLE = e.target.value.trim(); localStorage.setItem("biome-handle", HANDLE); resense(); });
$("#where").addEventListener("change", e => {
  WHERE = e.target.value.trim(); localStorage.setItem("biome-where", WHERE); resense(); });

// --- the door (substrate) ------------------------------------------------
async function readBlock(name) {
  const r = await fetch(DOOR + "?block=" + encodeURIComponent(name));
  return r.ok ? r.json() : null;
}
async function listBlocks() {
  const r = await fetch(DOOR); return r.ok ? (await r.json()).blocks || [] : [];
}
async function writeBlock(name, content) {           // whole-block write (recipe liquid)
  const r = await fetch(DOOR, { method:"POST", headers:{"Content-Type":"application/json"},
                                body: JSON.stringify({ block:name, content }) });
  return r.json();
}
async function voicePoint(block, number, content) {  // point-write at an address (the I-axis write)
  const r = await fetch(DOOR, { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ block, number, content, handle: HANDLE }) });
  return r.json();
}

// --- the engagement layer (fold.py, served) ------------------------------
async function readFrame() {
  if (!WHERE) return null;
  const r = await fetch("/frame?where=" + encodeURIComponent(WHERE) +
    "&who=" + encodeURIComponent(HANDLE) + "&when=" + encodeURIComponent(WHEN));
  return r.ok ? r.json() : null;
}
async function readSocial() {
  if (!WHERE) return null;
  const r = await fetch("/social?where=" + encodeURIComponent(WHERE));
  return r.ok ? r.json() : null;
}

// --- the relay (vapour, ephemeral) ---------------------------------------
async function beat(vapour) {
  return (await fetch(RELAY, { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ frame:SCOPE, handle:HANDLE||"someone", vapour, face:"observer" }) })).json();
}
async function relayView() {
  return (await fetch(RELAY + "?frame=" + encodeURIComponent(SCOPE) +
                      "&handle=" + encodeURIComponent(HANDLE||"someone"))).json();
}

// --- sense the mode: a place + an engagement door => fan-and-fold ---------
async function resense() {
  if (WHERE) {
    const fr = await readFrame();
    if (fr && fr.where) { MODE = "engagement"; ADDRESS = fr.where.address; SCOPE = fr.where.address;
                          paintEngagementChrome(); refresh(); return; }
  }
  MODE = "recipe"; await loadRecipe(); paintRecipeChrome(); renderRecipe(); refresh();
}
function paintEngagementChrome() {
  $("#submit").textContent = "voice it ↓"; $("#commit").hidden = true;
  $("#liquidlabel").innerHTML = 'liquid — the fan <span class="hint">(everyone’s rendition of this place)</span>';
}
function paintRecipeChrome() {
  $("#submit").textContent = "submit ↓"; $("#commit").hidden = false;
  $("#liquidlabel").innerHTML = 'liquid — submitted <span class="hint">(staged through the door, shared)</span>';
}

// --- engagement render: the fan and the fold -----------------------------
async function renderEngagement() {
  const fr = await readFrame();
  if (!fr || !fr.where) { $("#frame").textContent = "(no world to stand in here)"; return; }
  ADDRESS = fr.where.address; SCOPE = fr.where.address;
  if (fr.where.name) $("#place").textContent = fr.where.name;
  const miss = ["S","T","I"].filter(k => !fr.mirror[k]);
  $("#coordnote").innerHTML = fr.coordinatable
    ? '<span style="color:#7fd6a6">✓ coordinatable</span>'
    : '<span style="color:#d99a6c">○ projection · ' + miss.join("/") + " not mirrored</span>";
  $("#frame").innerHTML =
    '<b>HERE</b> · ' + esc(fr.where.name || fr.where.address) + '  (pscale ' + fr.where.pscale + ')\n  ' +
      esc(fr.S.text || "(this place has no public voicing yet)") + '\n\n' +
    '<b>NOW</b> · ' + esc(fr.T.text) + '   <span class="' + (fr.T.sign==="mirror"?"coord":"proj") + '">[' + esc(fr.T.sign) + ']</span>\n\n' +
    '<b>YOU</b> · ' + esc(fr.I.text || "(you have not voiced this place — say it below)") +
      '   <span class="' + (fr.presence.sign==="mirror"?"coord":"proj") + '">[' + esc(fr.presence.sign) + ']</span>';
  const soc = await readSocial();
  const pub = (soc && soc.public) || fr.S.text;
  $("#solid").innerHTML = pub ? '<div class="row">' + esc(pub) + '</div>'
    : '<span class="empty">this place has no public voicing yet</span>';
  const members = (soc && soc.members) || [];
  $("#liquid").innerHTML = members.length ? members.map(m =>
      '<div class="row"><b' + (slug(m.who)===slug(HANDLE) ? ' class="mine"' : '') + '>' + esc(m.who) +
      '</b> <span class="sign">' + esc(m.sign) + '</span> — ' + esc(m.account) + '</div>').join("")
    : '<span class="empty">no one has voiced this place yet — be the first</span>';
  $("#fold").innerHTML = members.length
    ? '<div class="row hint">the room’s sense — the fold of ' + members.length + ' rendition' +
        (members.length>1?'s':'') + ' (a keyed reader weaves these into one voicing):</div>' +
      members.map(m => '<div class="row">· ' + esc(m.account) + '</div>').join("")
    : '<span class="empty">nothing to fold yet</span>';
}

// --- the I-axis write: voice your rendition into your own shell -----------
async function voiceHere() {
  const text = $("#draft").value.trim();
  if (!HANDLE) return flash("name yourself first");
  if (!WHERE)  return flash("choose a place first");
  if (!text)   return flash("nothing to voice");
  const fr = await readFrame();
  if (!fr || !fr.where) return flash("can't resolve that place");
  await voicePoint("surface-" + slug(HANDLE), fr.where.address, text);   // spark point-write at the address
  await beat(""); $("#draft").value = ""; flash("voiced into your shell — it joins the fan");
  refresh();
}

// --- recipe fallback (no place chosen): walk a `frame` recipe with spark --
async function loadRecipe() {
  RECIPE = await readBlock("frame");
  if (!RECIPE) {
    RECIPE = { "1": { "1": {"0":"here · space",  "1": Q.get("space")    || "upperton-space"},
                      "2": {"0":"now · time",     "1": Q.get("time")     || "upperton-time"},
                      "3": {"0":"who · the room", "1": Q.get("identity") || "upperton-identity"} },
               "2": Q.get("walk") || "1,1,2,1" };
  }
  WALK = String(RECIPE["2"]).split(","); SCOPE = WALK.join(",");
}
function registers() {
  const r = RECIPE["1"] || {}, out = [];
  for (const d of DIGITS) if (r[d] && r[d]["1"]) out.push({ label: r[d]["0"] || "", block: r[d]["1"] });
  return out;
}
async function renderRecipe() {
  const regs = registers();
  const blocks = await Promise.all(regs.map(r => readBlock(r.block)));
  if (blocks.every(b => !b)) { $("#frame").textContent =
      "(no world here — name a place above, or seed the frame recipe: " + regs.map(r=>r.block).join(" / ") + ")"; return; }
  const lines = [];
  regs.forEach((r, i) => {
    const b = blocks[i]; if (!b) return;
    lines.push(r.label.toUpperCase());
    spindle(b, WALK).forEach(x => lines.push("  · " + x));
    ring(b, WALK).forEach(x => lines.push("    – " + x));
    lines.push("");
  });
  $("#frame").textContent = lines.join("\n").trimEnd();
  const room = blocks[0] ? voice(descend(blocks[0], WALK)) : "";
  const p = room ? room.split(/[—,]/)[0].trim() : ""; if (p) $("#place").textContent = p;
}
function liquidName(h) { return "liquid-" + slug(h); }
async function submitRecipe() {
  const intent = $("#draft").value.trim();
  if (!HANDLE) return flash("name yourself first");
  if (!intent) return flash("nothing to submit");
  await writeBlock(liquidName(HANDLE), { "0": HANDLE + " — submitted", "1": SCOPE, "2": intent });
  await beat(""); $("#draft").value = ""; flash("submitted to liquid"); refresh();
}
async function allLiquid() {
  const names = (await listBlocks()).filter(n => n.startsWith("liquid-"));
  const out = [];
  for (const name of names) { const b = await readBlock(name);
    if (b && b["1"] === SCOPE && b["2"]) out.push({ who: (b["0"]||"").split(" — ")[0], intent: b["2"] }); }
  return out;
}
async function commitRecipe() {
  const liquid = await allLiquid();
  if (!liquid.length) return flash("nothing submitted to commit");
  await writeBlock("resolve", { "0": SCOPE }); flash("committing — the room settles…");
}
async function renderRecipeZones() {
  const liquid = await allLiquid();
  $("#liquid").innerHTML = liquid.length
    ? liquid.map(l => '<div class="row"><b>'+esc(l.who)+'</b> — '+esc(l.intent)+'</div>').join("")
    : '<span class="empty">nothing submitted yet</span>';
  const s = await readBlock("scenes");
  const rows = s ? DIGITS.filter(k=>k in s && typeof s[k]==="string").map(k=>s[k]) : [];
  $("#solid").innerHTML = rows.length
    ? rows.reverse().map(t => '<div class="row">'+esc(t)+'</div>').join("")
    : '<span class="empty">nothing has settled</span>';
  $("#fold").innerHTML = '<span class="empty">— (the fold is the engagement view; name a place above)</span>';
}

// --- vapour + the poll loop ----------------------------------------------
function renderVapour(present) {
  const live = (present||[]).filter(p => p.vapour && p.vapour.trim());
  const n = (present||[]).length + (HANDLE ? 1 : 0);
  $("#present").textContent = n > 1 ? n + " here" : (HANDLE ? "just you here" : "no one here yet");
  $("#vapour").innerHTML = live.length
    ? live.map(p => '<div class="row"><span class="who">'+esc(p.handle)+'</span> '+esc(p.vapour)+'</div>').join("")
    : '<span class="empty">no one else is drafting</span>';
}
let polling = false;
async function refresh() {
  if (polling || !SCOPE) return; polling = true;
  try {
    const view = HANDLE ? await beat($("#draft").value.trim()) : await relayView();
    renderVapour(view.present);
    if (MODE === "engagement") await renderEngagement();
    else await renderRecipeZones();
  } catch (e) { /* the door went quiet; the next tick retries */ }
  finally { polling = false; }
}
let flashT;
function flash(msg) { $("#status").textContent = msg; clearTimeout(flashT); flashT = setTimeout(()=>$("#status").textContent="", 2500); }

$("#submit").addEventListener("click", () => MODE === "engagement" ? voiceHere() : submitRecipe());
$("#commit").addEventListener("click", commitRecipe);
$("#draft").addEventListener("keydown", e => { if (e.key==="Enter" && (e.metaKey||e.ctrlKey))
  (MODE === "engagement" ? voiceHere() : submitRecipe()); });

await resense();                                          // sense the mode, then render
setInterval(refresh, 1500);                               // the heartbeat: share vapour, see the fan move
</script>
</body>
</html>
