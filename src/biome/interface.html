<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>the biome — a shared frame</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { background:#0b0d12; color:#cdd3df; font:15px/1.6 Georgia,serif;
         max-width:760px; margin:0 auto; padding:20px 18px 90px; }
  h1 { font:600 16px/1.4 system-ui,sans-serif; color:#e8edf6; letter-spacing:.2px; margin:0 0 4px; }
  h1 b { color:#c7b3f0; }
  .sub { color:#7f8aa0; font:12px system-ui,sans-serif; margin:0 0 16px; }
  .sub input { background:#0e1117; color:#e8edf6; border:1px solid #2a3146; border-radius:6px;
               padding:3px 8px; font:12px system-ui,sans-serif; width:130px; }
  label { display:block; font:11px system-ui,sans-serif; color:#7f8aa0;
          text-transform:uppercase; letter-spacing:.1em; margin:20px 0 7px; }
  .frame { white-space:pre-wrap; background:#11141b; border:1px solid #232838; border-radius:8px;
           padding:14px; font:12.5px/1.55 ui-monospace,SFMono-Regular,monospace; color:#aeb6c6;
           max-height:280px; overflow:auto; }
  /* the three zones — vapour rises, solid settles */
  .zone { border-radius:8px; padding:11px 13px; margin-top:7px; min-height:30px; }
  .vapour { border:1px dashed #2c3550; background:#0d1018; }
  .liquid { border:1px solid #3a3320; background:#15120c; border-left:3px solid #d9a441; }
  .solid  { border:1px solid #22304a; background:#0c1320; border-left:3px solid #4ea8d9; }
  .row { padding:4px 0; }
  .who { color:#c7b3f0; font:12px system-ui,sans-serif; }
  .vapour .row { color:#8893a6; font-style:italic; }
  .vapour .me { color:#cdd3df; font-style:normal; }
  .liquid .row b { color:#e6c07a; font-weight:600; }
  .solid .row { color:#bcd0e6; padding:8px 0; border-top:1px solid #16202e; }
  .solid .row:first-child { border-top:0; }
  .empty { color:#56607a; font-style:italic; font:13px system-ui,sans-serif; }
  textarea { width:100%; background:#0e1117; color:#e8edf6; border:1px solid #2a3146; border-radius:8px;
             padding:11px; font:15px/1.5 Georgia,serif; resize:vertical; }
  .acts { margin-top:9px; display:flex; gap:9px; align-items:center; }
  button { padding:8px 18px; border:0; border-radius:8px; font:600 13px system-ui,sans-serif; cursor:pointer; }
  .submit { background:#d9a441; color:#161208; }
  .commit { background:#2a3650; color:#cfe0f2; }
  button:disabled { background:#39414f; color:#8a93a6; cursor:default; }
  .hint { color:#56607a; font:11px system-ui,sans-serif; }
</style>
</head>
<body>
  <h1><b id="place">a shared frame</b></h1>
  <p class="sub">you are <input id="handle" placeholder="a name"> · <span id="present">alone here</span></p>

  <label>your bound moment — here · now · who</label>
  <div class="frame" id="frame">reading the world…</div>

  <label>vapour — thinking aloud <span class="hint">(live, shared, never saved)</span></label>
  <textarea id="draft" rows="2" placeholder="type — others here see this as you think…"></textarea>
  <div class="zone vapour" id="vapour"><span class="empty">no one else is drafting</span></div>

  <label>liquid — submitted <span class="hint">(staged through the door, shared)</span></label>
  <div class="zone liquid" id="liquid"><span class="empty">nothing submitted yet</span></div>
  <div class="acts">
    <button class="submit" id="submit">submit ↓</button>
    <button class="commit" id="commit">commit →</button>
    <span class="hint" id="status"></span>
  </div>

  <label>solid — committed <span class="hint">(synthesised by the room)</span></label>
  <div class="zone solid" id="solid"><span class="empty">nothing has settled</span></div>

<script type="module">
// the genome interface — a shared VLS frame over the biome door + relay.
// substrate (world, liquid, solid) rides the door; vapour rides the relay.
// the FOLD is not coded here — it is read from the `frame` recipe block (which
// blocks are the registers, at what address) and interpreted with spark. A new
// world is a new recipe block, not new page code.
import { descend, voice, spindle, ring } from "/spark.js";
const Q = new URLSearchParams(location.search);
const DOOR = "/.well-known/biome-beach", RELAY = "/relay";
const DIGITS = "123456789".split("");
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let HANDLE = localStorage.getItem("biome-handle") || "";
let PLACE = "";
let RECIPE = null, WALK = [], SCOPE = "";                     // set from the recipe block
$("#handle").value = HANDLE;
$("#handle").addEventListener("change", e => {
  HANDLE = e.target.value.trim(); localStorage.setItem("biome-handle", HANDLE); refresh();
});

// --- the door (substrate) ------------------------------------------------
async function readBlock(name) {
  const r = await fetch(DOOR + "?block=" + encodeURIComponent(name));
  return r.ok ? r.json() : null;
}
async function listBlocks() {
  const r = await fetch(DOOR); return r.ok ? (await r.json()).blocks || [] : [];
}
async function writeBlock(name, content) {
  const r = await fetch(DOOR, { method:"POST", headers:{"Content-Type":"application/json"},
                                body: JSON.stringify({ block:name, content }) });
  return r.json();
}

// --- the recipe: how this space folds (read from a block, not coded) -----
async function loadRecipe() {
  RECIPE = await readBlock("frame");
  if (!RECIPE) {                                             // fallback: query params, world-agnostic defaults
    RECIPE = { "1": { "1": {"0":"here · space",    "1": Q.get("space")    || "upperton-space"},
                      "2": {"0":"now · time",       "1": Q.get("time")     || "upperton-time"},
                      "3": {"0":"who · the room",   "1": Q.get("identity") || "upperton-identity"} },
               "2": Q.get("walk") || "1,1,2,1",
               "3": "Witness the table: name each who and what they committed, as one settled line." };
  }
  WALK = String(RECIPE["2"]).split(",");
  SCOPE = WALK.join(",");                                    // the relay + liquid scope key
}
function registers() {                                       // [{label, block}] read off the recipe
  const r = RECIPE["1"] || {}, out = [];
  for (const d of DIGITS) if (r[d] && r[d]["1"]) out.push({ label: r[d]["0"] || "", block: r[d]["1"] });
  return out;
}

// --- the relay (vapour, ephemeral) ---------------------------------------
async function beat(vapour) {
  return (await fetch(RELAY, { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ frame:SCOPE, handle:HANDLE||"someone", vapour, face:"observer" }) })).json();
}
async function relayView() {
  return (await fetch(RELAY + "?frame=" + encodeURIComponent(SCOPE) +
                      "&handle=" + encodeURIComponent(HANDLE||"someone"))).json();
}

// --- the frame: interpret the recipe with spark (no coded fold) ----------
async function renderFrame() {
  const regs = registers();
  const blocks = await Promise.all(regs.map(r => readBlock(r.block)));
  if (blocks.every(b => !b)) {
    $("#frame").textContent = "(no world here — the frame recipe names " +
      regs.map(r => r.block).join(" / ") + "; seed them through the door)";
    return;
  }
  const lines = [];
  regs.forEach((r, i) => {
    const b = blocks[i]; if (!b) return;
    lines.push(r.label.toUpperCase());
    spindle(b, WALK).forEach(x => lines.push("  · " + x));   // the telescope down the walk
    ring(b, WALK).forEach(x => lines.push("    – " + x));    // the children at the place (features / whos)
    lines.push("");
  });
  $("#frame").textContent = lines.join("\n").trimEnd();
  const room = blocks[0] ? voice(descend(blocks[0], WALK)) : "";
  PLACE = room ? room.split(/[—,]/)[0].trim() : ""; if (PLACE) $("#place").textContent = PLACE;
}

// --- liquid: each player owns liquid-<handle> (digit-keyed, race-free) ----
function liquidName(h) { return "liquid-" + h.replace(/[^a-z0-9-]/gi, "").toLowerCase(); }
async function submit() {                                    // vapour -> liquid: stage an intention
  const intent = $("#draft").value.trim();
  if (!HANDLE) return flash("name yourself first");
  if (!intent) return flash("nothing to submit");
  await writeBlock(liquidName(HANDLE), { "0": HANDLE + " — submitted", "1": SCOPE, "2": intent });
  await beat("");                                            // vapour clears on submit
  $("#draft").value = "";
  flash("submitted to liquid");
  refresh();
}
async function allLiquid() {                                 // durable: listed from the door, not tied to live presence
  const names = (await listBlocks()).filter(n => n.startsWith("liquid-"));
  const out = [];
  for (const name of names) {
    const b = await readBlock(name);
    if (b && b["1"] === SCOPE && b["2"])
      out.push({ who: (b["0"]||"").split(" — ")[0] || name.replace(/^liquid-/, ""), intent: b["2"] });
  }
  return out;
}

// --- solid: ask the resolver to settle. A mind (the resolver beside the door)
//     reads the mechanic block, arbitrates the committed acts, and writes the
//     scene; the kernel only routes. No client-side concatenation. ----------
async function commit() {                                    // liquid -> solid: the medium synthesises
  const liquid = await allLiquid();
  if (!liquid.length) return flash("nothing submitted to commit");
  await writeBlock("resolve", { "0": SCOPE });    // the watch-loop resolver (medium-LLM) settles the table
  flash("committing — the room settles…");
}

// --- render the zones ----------------------------------------------------
function renderVapour(present) {
  const live = (present||[]).filter(p => p.vapour && p.vapour.trim());
  const n = (present||[]).length + (HANDLE ? 1 : 0);
  $("#present").textContent = n > 1 ? n + " here" : (HANDLE ? "just you here" : "no one here yet");
  $("#vapour").innerHTML = live.length
    ? live.map(p => '<div class="row"><span class="who">'+esc(p.handle)+'</span> '+esc(p.vapour)+'</div>').join("")
    : '<span class="empty">no one else is drafting</span>';
}
async function renderLiquid() {
  const liquid = await allLiquid();
  $("#liquid").innerHTML = liquid.length
    ? liquid.map(l => '<div class="row"><b>'+esc(l.who)+'</b> — '+esc(l.intent)+'</div>').join("")
    : '<span class="empty">nothing submitted yet</span>';
}
async function renderSolid() {
  const s = await readBlock("scenes");
  const rows = s ? DIGITS.filter(k=>k in s && typeof s[k]==="string").map(k=>s[k]) : [];
  $("#solid").innerHTML = rows.length
    ? rows.reverse().map(t => '<div class="row">'+esc(t)+'</div>').join("")
    : '<span class="empty">nothing has settled</span>';
}

// --- the poll loop (vapour-by-poll; no socket) ---------------------------
let polling = false;
async function refresh() {
  if (polling || !SCOPE) return; polling = true;
  try {
    const view = HANDLE ? await beat($("#draft").value.trim()) : await relayView();
    renderVapour(view.present);
    await renderLiquid();
    await renderSolid();
  } catch (e) { /* the door went quiet; the next tick retries */ }
  finally { polling = false; }
}
let flashT;
function flash(msg) { $("#status").textContent = msg; clearTimeout(flashT); flashT = setTimeout(()=>$("#status").textContent="", 2500); }

$("#submit").addEventListener("click", submit);
$("#commit").addEventListener("click", commit);
$("#draft").addEventListener("keydown", e => { if (e.key==="Enter" && (e.metaKey||e.ctrlKey)) submit(); });

await loadRecipe();                                          // the recipe first — it sets the walk + scope
renderFrame();
refresh();
setInterval(refresh, 1500);                                  // the heartbeat: share vapour, see others
</script>
</body>
</html>
